<div class="panel panel-default">
  <div class="panel-heading clearfix">
    <h3 class="panel-title pull-left">Contacts</h3>
    <a href="#" class="btn btn-success pull-right">New Contact</a>
  </div>
  <div class="panel-body">
    <hr>
    <div class="list-group">
      @for (contactEl of contacts; track contactEl) {
        <cms-contact-item [contact]="contactEl"
        (selectedContactEvent)="onSelected(contactEl)"></cms-contact-item>
      }
    </div>
  </div>
</div>
