<a 
    href="#"
    class="list-group-item clearfix"
    (click)="onSelected()">
    <div class="pull-left">
        <h4 class="list-group-item-heading">
            Bro. {{ contact.name.split(' ')[contact.name.split(' ').length - 1] }}
        </h4>
    </div>
    <span class="pull-right">
        <img 
            [src]="contact.imageUrl"
            alt="{{contact.name}}"
            class="img-responsive"
            style="max-height: 50px;">
    </span>
</a>
